name: ci-lab-app

on:              
 push:                 
  branches: 
    - main       

jobs: 
 build-and-deploy: 
  runs-on: ubuntu-latest 
  steps:  
   - name: Descargar el codigo 
     uses:  actions/checkout@v3
     
   - name: Hacer login Docker hub
     uses: docker/login-action@v3
       with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir la imagen docker
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ci-cd-app:v1 .

      - name: Ejecutar el contenedor de prueba
        run: |
          docker run -d --name website -p 8082:80 ${{ secrets.DOCKER_USERNAME }}/ci-cd-app:v1

      - name: Validar que la aplicacion responde correctamente
        run: |
          sleep 3
          curl http://localhost:8082

      - name: Publicar la imagen en Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/ci-cd-app:v1
